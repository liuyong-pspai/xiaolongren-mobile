<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>眼睛测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#e0d8c8;font-family:sans-serif;padding:40px 20px}
h2{color:#d4a000;margin-bottom:20px}
.key-row{display:flex;align-items:center;gap:0;position:relative;max-width:400px;margin-bottom:20px}
.key-row input{flex:1;min-width:0;padding:14px 40px 14px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#e0d8c8;font-size:16px;outline:none}
.key-row input:focus{border-color:rgba(212,160,0,0.3)}
.eye-btn{background:none;border:none;cursor:pointer;font-size:20px;padding:4px;position:absolute;right:6px;top:50%;transform:translateY(-50%);z-index:2;color:#888;line-height:1}
.eye-btn:hover{color:#eee}
.info{font-size:13px;color:#888}
</style></head>
<body>
<h2>👁 眼睛测试</h2>
<p class="info">在下面输入框打字，点👁切换</p>
<div class="key-row">
  <input type="password" id="test-key" placeholder="sk-输入测试文字...">
  <button class="eye-btn" id="test-eye" onclick="toggleEye()">👁</button>
</div>
<div class="info" id="status">当前: password 模式</div>
<script>
function toggleEye() {
  var inp = document.getElementById('test-key');
  var btn = document.getElementById('test-eye');
  var st = document.getElementById('status');
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.textContent = '👁‍🗒';
    st.textContent = '当前: text 模式（明文可见）';
  } else {
    inp.type = 'password';
    btn.textContent = '👁';
    st.textContent = '当前: password 模式（隐藏）';
  }
}
</script>
</body></html>
