name: 构建小龙人APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装Android SDK
        uses: android-actions/setup-android@v3

      - name: 生成Gradle Wrapper
        run: |
          cd android
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            # 下载gradle wrapper jar
            mkdir -p gradle/wrapper
            curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
            chmod 644 gradle/wrapper/gradle-wrapper.jar
          fi
          ls -la gradle/wrapper/
          ls -la gradlew

      - name: 检查项目结构
        run: |
          echo "=== 项目结构 ==="
          find android -type f -name "*.java" -o -name "*.xml" -o -name "*.gradle" -o -name "*.properties" | sort
          echo "=== settings.gradle ==="
          cat android/settings.gradle
          echo ""
          echo "=== app/build.gradle ==="
          cat android/app/build.gradle

      - name: 构建APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -100

      - name: 查找APK
        run: |
          echo "查找APK..."
          find . -name "*.apk" -type f 2>/dev/null
          echo "---"
          find android -type d -name "outputs" 2>/dev/null

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-apk
          path: "**/*.apk"
