name: 构建小龙人APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装Android SDK
        uses: android-actions/setup-android@v3

      - name: 配置SDK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          cat android/local.properties

      - name: 设置Gradle
        run: |
          cd android
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          chmod 644 gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: 构建APK
        run: |
          cd android
          export ANDROID_HOME=$ANDROID_HOME
          ./gradlew assembleDebug --no-daemon 2>&1

      - name: 查找并输出APK
        run: |
          echo "=== 搜索APK ==="
          find . -name "*.apk" 2>/dev/null
          find / -name "*.apk" 2>/dev/null | head -5
          echo "=== build目录 ==="
          find . -path "*/build/outputs/*" -type d 2>/dev/null
          echo "=== 列出build ==="
          ls -laR android/app/build/ 2>/dev/null | head -50

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-apk
          path: .
          if-no-files-found: warn

      - name: 发布Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "**/*.apk"
          generate_release_notes: true
