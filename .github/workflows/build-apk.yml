name: 构建小龙人APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装Android SDK
        uses: android-actions/setup-android@v3

      - name: 生成Gradle Wrapper
        run: |
          cd android
          # gradle-wrapper.jar 在CI中通过gradle wrapper命令生成
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            apt-get update -qq && apt-get install -y -qq gradle 2>/dev/null || true
            which gradle && cd android && gradle wrapper --gradle-version 8.5 || true
          fi

      - name: 构建APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon || {
            echo "Gradle直接构建失败，尝试用系统gradle"
            gradle assembleDebug --no-daemon 2>/dev/null || true
          }

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
