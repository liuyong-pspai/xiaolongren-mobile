name: 构建小龙人APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装Android SDK
        uses: android-actions/setup-android@v3

      - name: 配置SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_HOME/
          echo "---"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "无platforms"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "无build-tools"

      - name: 创建local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          cat android/local.properties

      - name: 设置Gradle
        run: |
          cd android
          mkdir -p gradle/wrapper
          # 下载gradle wrapper jar
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          chmod 644 gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: 构建APK
        run: |
          cd android
          export ANDROID_HOME=$ANDROID_HOME
          export JAVA_HOME=$JAVA_HOME_17_X64
          echo "JAVA_HOME=$JAVA_HOME"
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tee /tmp/gradle.log | tail -80

      - name: 显示Gradle日志
        if: always()
        run: |
          if [ -f /tmp/gradle.log ]; then
            echo "=== 最后200行 ==="
            tail -200 /tmp/gradle.log
            echo "=== 错误行 ==="
            grep -i "error\|FAILED\|Exception\|BUILD FAILED" /tmp/gradle.log | head -20
          fi
          echo "=== 查找APK ==="
          find / -name "*.apk" -type f 2>/dev/null | head -10 || true

      - name: 上传APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-apk
          path: |
            **/*.apk
