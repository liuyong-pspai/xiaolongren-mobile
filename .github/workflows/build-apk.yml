name: 构建小龙人APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置Android SDK
        uses: android-actions/setup-android@v3

      - name: 接受licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: 创建local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "Created local.properties: sdk.dir=$ANDROID_HOME"

      - name: 下载Gradle Wrapper
        run: |
          cd android
          mkdir -p gradle/wrapper
          # Gradle wrapper jar from official source
          curl -sLo gradle/wrapper/gradle-wrapper.jar "https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar"
          chmod 644 gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          echo "Gradle wrapper ready"

      - name: Grant execute permission
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          export ANDROID_HOME=$ANDROID_HOME
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-apk
          path: "**/*.apk"
          if-no-files-found: 'error'

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "**/*.apk"
