name: 构建小龙人APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置Android SDK
        uses: android-actions/setup-android@v3

      - name: 检查环境
        run: |
          echo "JAVA_HOME: $JAVA_HOME"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "SDK root:"
          ls $ANDROID_HOME/ || echo "no ANDROID_HOME"
          ls $ANDROID_SDK_ROOT/ || echo "no SDK_ROOT"
          echo "platforms:"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "no platforms dir"
          echo "---"
          # 直接安装platform
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" 2>&1 | tail -5 || echo "sdkmanager failed"

      - name: 创建local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: 构建APK
        run: |
          cd android
          export ANDROID_HOME=$ANDROID_HOME
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          # 直接运行gradle，捕获所有输出
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle_output.txt
          echo "EXIT_CODE=$?" >> $GITHUB_OUTPUT

      - name: 显示Gradle输出
        if: always()
        run: |
          if [ -f /tmp/gradle_output.txt ]; then
            echo "=== Gradle最后100行 ==="
            tail -100 /tmp/gradle_output.txt
            echo "=== 错误摘要 ==="
            grep -i "error\|FAILED\|Exception\|\$\$\$" /tmp/gradle_output.txt | tail -20 || echo "no errors found"
          fi

      - name: 上传APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-apk
          path: "**/*.apk"
          if-no-files-found: 'ignore'
