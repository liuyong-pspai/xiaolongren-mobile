name: Build XiaoLongRen APK

'on':
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install required SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" || true
          $ANDROID_HOME/tools/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" || true

      - name: Generate gradle wrapper
        run: |
          cd android
          which gradle && gradle wrapper --gradle-version=8.2 || true
          ls -la gradle/wrapper/ || true

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          echo "=== Building APK ==="
          export ANDROID_HOME=$ANDROID_HOME
          ./gradlew assembleRelease 2>&1 | tee gradle_output.txt
          echo "=== Build Exit Code: $? ==="

      - name: Check APK output
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" 2>/dev/null
          echo "=== app/build/outputs ==="
          find android/app/build/outputs -type f 2>/dev/null || echo "No outputs directory"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-apk
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: 'warn'
