name: Build XiaoLongRen APK

'on':
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Check environment
        run: |
          echo "ANDROID_HOME=${ANDROID_HOME:-NOT_SET}"
          java -version 2>&1 | head -1
          echo "SDK dirs:"
          find ${ANDROID_HOME:-/usr/local/lib/android} -maxdepth 2 -name "platforms" -o -name "build-tools" 2>/dev/null | head -10

      - name: Accept SDK licenses
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          yes | ${ANDROID_HOME}/tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install required SDK components
        run: |
          SDK_MGR="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ -f "$SDK_MGR" ]; then
            $SDK_MGR "platforms;android-34" "build-tools;34.0.0" 2>&1
          else
            echo "No cmdline-tools, trying tools/bin/sdkmanager"
            ${ANDROID_HOME}/tools/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 || true
          fi

      - name: Generate gradle wrapper
        run: |
          cd android
          # 用gradle系统命令生成wrapper
          gradle wrapper --gradle-version=8.2 2>&1
          echo "=== After wrapper generation ==="
          ls -la gradle/wrapper/
          ls -la gradlew

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          export ANDROID_HOME=${ANDROID_HOME}
          echo "=== Starting Debug Build ==="
          ./gradlew assembleDebug 2>&1
          BUILD_EXIT=$?
          echo "=== Build Exit Code: $BUILD_EXIT ==="
          exit $BUILD_EXIT

      - name: List APK files
        run: |
          echo "=== All APKs in project ==="
          find . -name "*.apk" 2>/dev/null
          echo "=== Build outputs ==="
          find android -path "*/build/outputs/*" -type f 2>/dev/null
          echo "=== Full tree of app/build ==="
          find android/app/build -type f 2>/dev/null | head -30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-apk
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/debug/**/*.apk
          if-no-files-found: 'error'
