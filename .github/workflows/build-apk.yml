name: Build XiaoLongRen APK

'on':
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Check environment
        run: |
          echo "ANDROID_HOME=${ANDROID_HOME:-NOT_SET}"
          java -version 2>&1 | head -1
          echo "SDK platforms:"
          ls ${ANDROID_HOME}/platforms/ 2>/dev/null || echo "No platforms dir"
          echo "SDK build-tools:"
          ls ${ANDROID_HOME}/build-tools/ 2>/dev/null || echo "No build-tools dir"

      - name: Accept SDK licenses
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          yes | ${ANDROID_HOME}/tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Ensure SDK components
        run: |
          SDK_MGR="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ -f "$SDK_MGR" ]; then
            $SDK_MGR --list 2>&1 | grep "android-34" | head -3 || echo "android-34 not available via cmdline-tools"
            $SDK_MGR "platforms;android-34" 2>&1 || true
          else
            echo "No cmdline-tools sdkmanager found"
          fi

      - name: Generate gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version=8.2 2>&1
          echo "=== Wrapper files ==="
          ls -la gradle/wrapper/
          ls -la gradlew
          echo "=== gradlew content (first 5 lines) ==="
          head -5 gradlew

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          export ANDROID_HOME=${ANDROID_HOME}
          echo "=== Starting build ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          ./gradlew assembleDebug --info 2>&1 || ./gradlew assembleDebug 2>&1
          BUILD_EXIT=$?
          echo "=== Build Exit Code: $BUILD_EXIT ==="
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "BUILD_FAILED=true" >> $GITHUB_ENV
            exit $BUILD_EXIT
          fi
          echo "BUILD_FAILED=false" >> $GITHUB_ENV

      - name: Locate APKs (step summary)
        if: always()
        run: |
          echo "## Build Output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### APK files found:" >> $GITHUB_STEP_SUMMARY
          find . -name "*.apk" 2>/dev/null >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### All build output files:" >> $GITHUB_STEP_SUMMARY
          find android -path "*/build/outputs/*" -type f 2>/dev/null >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### app/build directory (top 50):" >> $GITHUB_STEP_SUMMARY
          find android/app/build -type f 2>/dev/null | head -50 >> $GITHUB_STEP_SUMMARY
          
          echo "=== Console output ==="
          echo "APKs:"
          find . -name "*.apk" 2>/dev/null
          echo "Build outputs:"
          find android -path "*/build/outputs/*" -type f 2>/dev/null | head -20
          echo "app/build tree:"
          find android/app/build -type f 2>/dev/null | head -30

      - name: Upload APK
        if: env.BUILD_FAILED == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-apk
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/**/*.apk
          if-no-files-found: 'warn'
