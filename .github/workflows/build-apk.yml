name: 构建小龙人APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置Android SDK
        uses: android-actions/setup-android@v3

      - name: 创建local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: 用系统Gradle构建
        run: |
          cd android
          # 直接下载一个gradle
          curl -sLO "https://services.gradle.org/distributions/gradle-8.0-bin.zip"
          unzip -q gradle-8.0-bin.zip
          export PATH="$PWD/gradle-8.0/bin:$PATH"
          gradle assembleDebug --no-daemon --stacktrace 2>&1

      - name: 查找APK
        run: |
          find / -name "*.apk" 2>/dev/null | head -20
          find . -name "*.apk" 2>/dev/null | head -20
          ls -la android/app/build/outputs/ 2>/dev/null || echo "无outputs"
          find . -path "*/build/outputs/*" -type f 2>/dev/null | head -20

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-apk
          path: "**/*.apk"
