name: 构建小龙人APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置Android SDK
        uses: android-actions/setup-android@v3

      - name: 创建local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: 检查环境
        run: |
          echo "JAVA_HOME: $JAVA_HOME"
          echo "ANDROID_HOME: $ANDROID_HOME"
          ls $ANDROID_HOME/platforms/
          ls $ANDROID_HOME/build-tools/

      - name: 构建
        run: |
          cd android
          echo "=== 下载Gradle ==="
          curl -sLO "https://services.gradle.org/distributions/gradle-8.0-bin.zip"
          echo "下载完成: $(ls -lh gradle-8.0-bin.zip | awk '{print $5}')"
          echo "=== 解压 ==="
          unzip -q gradle-8.0-bin.zip
          echo "=== 构建 ==="
          export PATH="$PWD/gradle-8.0/bin:$PATH"
          gradle assembleDebug --no-daemon --stacktrace 2>&1

      - name: 查找APK
        run: |
          echo "=== 搜索APK文件 ==="
          find . -name "*.apk" 2>/dev/null | head -20
          find / -name "*.apk" -type f 2>/dev/null | head -10
          echo "=== outputs目录 ==="
          find . -path "*/build/outputs/*" -type f 2>/dev/null | head -20
          ls -laR android/app/build/ 2>/dev/null | head -30

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-apk
          path: "**/*.apk"
