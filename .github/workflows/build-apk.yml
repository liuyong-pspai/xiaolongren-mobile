name: 构建小龙人APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 设置Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装依赖
        run: |
          npm install
          npx cap init 小龙人 com.pspai.xiaolongren --web-dir frontend/pwa/html --no-sync
          
      - name: 添加Android平台
        run: npx cap add android

      - name: 替换图标
        run: |
          mkdir -p android/app/src/main/res
          # 复制新图标
          cp frontend/pwa/html/icon-192.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png 2>/dev/null || true
          cp frontend/pwa/html/icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png 2>/dev/null || true

      - name: 构建APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: 创建Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
