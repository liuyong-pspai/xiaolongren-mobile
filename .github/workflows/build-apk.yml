name: 构建小龙人APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装platforms
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-34" "build-tools;34.0.0" 2>&1

      - name: 创建local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: 打印Android SDK信息
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME_17_X64"
          ls $ANDROID_HOME/
          ls $ANDROID_HOME/platforms/
          ls $ANDROID_HOME/build-tools/

      - name: 用系统gradle构建
        run: |
          # 直接用apt-get安装gradle，不依赖wrapper
          sudo apt-get update -qq
          sudo apt-get install -y -qq gradle 2>&1 | tail -5
          which gradle
          gradle --version | head -5
          cd android
          gradle assembleDebug --no-daemon --stacktrace 2>&1
