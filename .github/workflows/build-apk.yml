name: 构建小龙人APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装Android SDK
        uses: android-actions/setup-android@v3

      - name: 生成Gradle Wrapper
        run: |
          cd android
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            apt-get update -qq && apt-get install -y -qq gradle 2>/dev/null || true
            which gradle 2>/dev/null && gradle wrapper --gradle-version 8.5 || true
          fi

      - name: 构建APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 查找APK
        run: |
          echo "查找APK..."
          find android -name "*.apk" 2>/dev/null
          find . -name "*.apk" 2>/dev/null

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-apk
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/*.apk
