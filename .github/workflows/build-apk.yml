name: 构建小龙人APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装Android SDK
        uses: android-actions/setup-android@v3

      - name: 生成Gradle Wrapper
        run: |
          cd android
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            mkdir -p gradle/wrapper
            curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          fi

      - name: 检查项目结构
        run: |
          echo "=== project结构 ==="
          cat android/settings.gradle
          echo "=== app/build.gradle ==="
          cat android/app/build.gradle
          echo "=== AndroidManifest ==="
          head -20 android/app/src/main/AndroidManifest.xml

      - name: 构建APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1

      - name: 查找并上传APK
        run: |
          echo "搜索APK..."
          find /home/runner -name "*.apk" -type f 2>/dev/null | head -20
          echo "---"
          find . -name "*.apk" -type f 2>/dev/null | head -20
          echo "---"
          # 尝试标准位置
          ls -la android/app/build/outputs/ 2>/dev/null || echo "无outputs目录"
          ls -la android/app/build/ 2>/dev/null || echo "无build目录"
          # 复制到工作目录
          mkdir -p /tmp/apk-output
          find . -name "*.apk" -exec cp {} /tmp/apk-output/ \; 2>/dev/null
          ls -la /tmp/apk-output/

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-apk
          path: /tmp/apk-output/
