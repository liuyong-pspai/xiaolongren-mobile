agent:
  provider: deepseek
  model: deepseek-v4-flash
  max_turns: 90
  skip_context_files: false
  memory_path: engine/MEMORY.md
  skills_dir: engine/skills
  skills_enabled: true
memory:
  memory_enabled: true
  memory_char_limit: 8000
  memory_migrate_threshold: 0.5
  user_profile_enabled: true
  user_char_limit: 20000
  nudge_interval: 10
  flush_min_turns: 6
fallback_model:
  provider: deepseek
  model: deepseek-v4-flash
