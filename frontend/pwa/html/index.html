<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a14;color:#e0d8c8;touch-action:manipulation}
:root{--gold:#d4a000;--gold-dim:rgba(212,160,0,0.3);--bg:#0d0d0d;--card:rgba(20,20,20,0.6);--text:#d0c8b8}

#app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);color:var(--text)}

#top{height:44px;padding:0 14px;padding-top:env(safe-area-inset-top,0);display:flex;align-items:center;justify-content:space-between;z-index:10;flex-shrink:0}
#top .t{font-size:15px;font-weight:bold;color:var(--gold)}
#top .r{display:flex;align-items:center;gap:6px}
#top .cfg-btn{width:28px;height:28px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--gold);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#top .memo-btn{width:28px;height:28px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#888;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#top .memo-btn:active{background:rgba(255,255,255,0.1)}

/* 备忘录弹窗 */
#memo-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;padding:20px}
#memo-overlay.show{display:flex}
#memo-box{width:100%;max-width:360px;background:#1a1a24;border-radius:14px;padding:18px;border:1px solid rgba(255,255,255,0.08)}
#memo-box .mb-title{font-size:14px;font-weight:bold;color:var(--gold);margin-bottom:10px}
#memo-box textarea{width:100%;height:160px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#e0d8c8;font-size:13px;padding:10px;resize:none;outline:none;line-height:1.5}
#memo-box textarea:focus{border-color:var(--gold-dim)}
#memo-box .mb-actions{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}
#memo-box .mb-actions button{padding:6px 16px;border-radius:6px;border:none;font-size:12px;cursor:pointer}
#memo-box .mb-save{background:var(--gold);color:#000}
#memo-box .mb-close{background:rgba(255,255,255,0.06);color:#888}

/* 配置弹窗 */
#cfg-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;padding:16px}
#cfg-overlay.show{display:flex}
#cfg-box{width:100%;max-width:380px;background:#161618;border-radius:16px;padding:20px;border:1px solid rgba(255,255,255,0.08);max-height:90vh;overflow-y:auto}
#cfg-box h2{font-size:16px;color:var(--gold);margin-bottom:16px;text-align:center}
#cfg-box .cg{margin-bottom:14px}
#cfg-box .cg label{display:block;font-size:12px;color:#888;margin-bottom:4px}
#cfg-box .cg select,#cfg-box .cg input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(0,0,0,0.3);color:#e0d8c8;font-size:14px;outline:none}
#cfg-box .cg select:focus,#cfg-box .cg input:focus{border-color:var(--gold-dim)}
#cfg-box .cg input::placeholder{color:#444}
#cfg-box .provider-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
#cfg-box .provider-card{padding:10px;border-radius:8px;border:2px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);cursor:pointer;text-align:center;font-size:13px;transition:all 0.15s}
#cfg-box .provider-card.selected{border-color:var(--gold);background:rgba(212,160,0,0.08)}
#cfg-box .provider-card:active{transform:scale(0.96)}
#cfg-box .cfg-actions{display:flex;gap:8px;margin-top:16px}
#cfg-box .cfg-actions button{flex:1;padding:12px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer}
#cfg-box .cfg-save{background:var(--gold);color:#000}
#cfg-box .cfg-cancel{background:rgba(255,255,255,0.06);color:#888}
#cfg-box .cfg-status{text-align:center;font-size:12px;margin-top:10px;min-height:18px}
#cfg-box .cfg-status.ok{color:#22c55e}
#cfg-box .cfg-status.err{color:#ef4444}
#cfg-box .cfg-summary{margin:12px 0;padding:12px;background:rgba(255,255,255,0.03);border-radius:8px;font-size:12px;color:#aaa;line-height:1.6}

#char-bar{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 14px 10px}
#char-bar .cw-sel{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex-shrink:0}
#char-picker-btn{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:#aaa;font-size:12px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#char-bar .cw:active{transform:scale(1.08)}
#char-bar .cmini{width:40px;height:40px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,0.08);transition:all 0.2s}
#char-bar .cw.sel .cmini{border-color:var(--gold)}
#char-bar .cmini img{width:100%;height:100%;object-fit:cover}
#char-bar .cn{font-size:9px;color:#888;transition:color 0.2s}
#char-bar .cw.sel .cn{color:var(--gold)}

#cur-avatar{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:10px;padding:4px 14px 8px;flex-direction:column}
#cur-avatar .ca-img{width:52px;height:52px;border-radius:12px;overflow:hidden;border:1.5px solid var(--gold-dim);box-shadow:0 2px 12px rgba(0,0,0,0.3);transition:all 0.3s}
#cur-avatar .ca-img img{width:100%;height:100%;object-fit:cover}
#cur-avatar .ca-tag{font-size:11px;color:#666}

#msgs{flex:1;overflow-y:auto;padding:8px 14px;scrollbar-width:none;display:flex;flex-direction:column;gap:8px}
#msgs::-webkit-scrollbar{display:none}
#msgs .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:1vh;color:#333}
#msgs .empty .er{width:30%;max-width:100px;height:105px;border-radius:14px;overflow:hidden;margin-bottom:10px;border:1px solid rgba(255,255,255,0.06);box-shadow:0 3px 20px rgba(0,0,0,0.4);display:none}
#msgs .empty .er img{width:100%;height:100%;object-fit:cover}
#msgs .empty .et{font-size:13px;color:#444;margin-bottom:2px}
#msgs .empty .es{font-size:11px;color:#2a2a2a}

.msg{display:flex;flex-direction:column;max-width:85%;animation:mi .25s ease}
@keyframes mi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end}
.msg.ai{align-self:flex-start}
.msg .mb{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.55;word-break:break-word}
.msg.user .mb{background:var(--gold);color:#000;border-bottom-right-radius:4px}
.msg.ai .mb{background:rgba(30,30,48,0.85);color:#d0c8b8;border-bottom-left-radius:4px}
.msg .mtime{font-size:9px;color:#3a3a4a;margin-top:2px;padding:0 4px}
.msg.user .mtime{text-align:right}
.msg .mbtns{margin-top:4px;display:flex;gap:6px}
.msg.ai .mbtns{padding-left:4px}
.mbtn{width:26px;height:26px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--gold);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.mbtn:active{transform:scale(1.2);background:var(--gold);color:#000}
.mbtn.playing{animation:tpulse 0.8s ease-in-out infinite}

#input-bar{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:8px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:rgba(0,0,0,0.4);border-top:1px solid rgba(255,255,255,0.04)}
#text-input{flex:1;padding:10px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#e0d8c8;font-size:15px;outline:none;resize:none;max-height:80px;font-family:inherit}
#text-input:focus{border-color:var(--gold-dim)}
#text-input::placeholder{color:#444}
#send-btn{width:40px;height:40px;border-radius:50%;border:none;background:var(--gold);color:#000;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
#send-btn:active{transform:scale(1.15)}
#send-btn:disabled{opacity:0.3;pointer-events:none}
#mic-btn{width:40px;height:40px;border-radius:50%;border:2px solid var(--gold-dim);background:rgba(200,168,78,0.08);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
#mic-btn:active,#mic-btn.active{background:var(--gold);border-color:var(--gold);transform:scale(1.1)}
#mic-btn .icon{width:18px;height:18px;pointer-events:none}
#mic-btn .icon svg{width:100%;height:100%}
#mic-btn.active{animation:tpulse 1s ease-in-out infinite}

@keyframes tpulse{0%,100%{box-shadow:0 0 15px var(--gold-dim)}50%{box-shadow:0 0 40px var(--gold),0 0 70px var(--gold-dim)}}

#install-banner{display:none;position:fixed;bottom:100px;left:12px;right:12px;z-index:150;background:rgba(0,0,0,0.92);border:1px solid var(--gold-dim);border-radius:14px;padding:14px 16px;align-items:center;gap:12px}
#install-banner.show{display:flex}
#install-banner .ib-close{position:absolute;top:6px;right:10px;color:#666;font-size:14px;cursor:pointer}
#install-banner .ib-txt{flex:1;font-size:13px;color:#ccc;line-height:1.4}
#install-banner button{padding:8px 16px;border-radius:8px;border:none;background:var(--gold);color:#000;font-size:14px;font-weight:bold;cursor:pointer;white-space:nowrap}

/* loading dots */
.typing-dots{display:inline-flex;gap:4px;padding:2px 0}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:td 1.2s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:0.3}30%{transform:translateY(-6px);opacity:1}}

@media(min-width:500px){#app{max-width:430px;margin:0 auto;border:1px solid rgba(255,255,255,0.04)}}
.eye-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:0 6px;color:#888;line-height:1;position:absolute;right:2px;top:50%;transform:translateY(-50%);z-index:2;display:flex;align-items:center;justify-content:center;height:100%}
.eye-btn:hover{color:#eee}
.key-row{display:flex;align-items:center;gap:0;position:relative}
.key-row input{flex:1;min-width:0;padding-right:30px!important}

</style>
</head>
<body>

<div id="app">
  <div id="top">
    <span class="t"><span class="status-dot" id="sd" title="引擎状态"></span>🐉 小龙人</span>
    <div class="r">

    </div>
  </div>

  <div id="msgs">

      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></span>
    </button>
    <button id="send-btn" type="button" ontouchend="sendText();event.preventDefault()" onclick="sendText()">➤</button>
  </div>
</div>

<!-- 备忘录弹窗 -->
<div id="memo-overlay" onclick="if(event.target===this)closeMemo()">
  <div id="memo-box">
    <div class="mb-title">📝 备忘录</div>
    <textarea id="memo-text" placeholder="记点什么..."></textarea>
    <div class="mb-actions">
      <button class="mb-close" onclick="closeMemo()">取消</button>
      <button class="mb-save" onclick="saveMemo()">保存</button>
    </div>
  </div>
</div>

<div id="install-banner">
  <span class="ib-close" onclick="this.parentElement.classList.remove('show')">✕</span>

<!-- 配置弹窗 -->
<div id="cfg-overlay" onclick="if(event.target===this)closeConfig()">
  <div id="cfg-box">
    <h2>⚙ 配置大模型</h2>
    <div class="cg"><label>选择模型提供商</label><div class="provider-grid" id="cfg-provider-grid"></div></div>
    <div class="cg"><label>🔑 API Key</label><div class="key-row"><input type="password" id="cfg-api-key" placeholder="sk-..." autocomplete="off"><button class="eye-btn" onclick="toggleKeyM()" id="cfg-key-eye-m">👁</button></div></div>
    <div class="cg" id="cfg-model-group"><label>🤖 模型</label><select id="cfg-model-select"></select></div>

    <div class="cfg-actions">
      <button class="cfg-cancel" onclick="closeConfig()">取消</button>
      <button class="cfg-save" onclick="saveConfig()">保存</button>

</div>

<script src="plugins/search.js"></script>

<script>

const PROVIDERS = {
  deepseek:  { name:'DeepSeek',  url:'https://api.deepseek.com/v1' },
  openai:    { name:'OpenAI',    url:'https://api.openai.com/v1' },
  anthropic: { name:'Anthropic', url:'https://api.anthropic.com/v1' },
  moonshot:  { name:'Moonshot',  url:'https://api.moonshot.cn/v1' },

let charId = 'longyuan';
let recognition = null, isListening = false, currentUtterance = null;
let isLoading = false;
let msgHistory = []; // [{role,content}]

// ====== 消息固化（跳转/刷新/关闭重开都不丢失）======
// 方式：每次从localStorage读→追加→写回（参考index.html龙宫版，不依赖内存变量）
function saveMessage(role, content) {
  try {
    var key = 'xlr_msgs';
    var msgs = JSON.parse(localStorage.getItem(key) || '[]');
    msgs.push({role: role, content: content});
    if (msgs.length > 50) msgs = msgs.slice(-50);
    localStorage.setItem(key, JSON.stringify(msgs));
  } catch(e) {}
}
function saveMessages() {
  // 全量保存：将整个msgHistory存到localStorage
  try { localStorage.setItem('xlr_msgs', JSON.stringify(msgHistory)); } catch(e) {}
}
function loadMessages() {
  try {
    const raw = localStorage.getItem('xlr_msgs');
    if (raw) {
      const arr = JSON.parse(raw);
      if (arr && arr.length) {
        msgHistory = arr;
        // 直接构建HTML，不调addMsg
        const d = document.getElementById('msgs');
        const eh = document.getElementById('empty-hint');
        if (eh) eh.remove();
        let html = '';
        arr.forEach(function(m) {
          const txt = escHtml(m.content);
          const cls = m.role === 'ai' ? 'ai' : 'user';
          html += '<div class="msg '+cls+'"><div class="mb">'+txt+'</div><div class="mtime"></div></div>';
        });
        d.innerHTML = html;
        d.scrollTop = d.scrollHeight;
        return true;
      }
    }
  } catch(e) {}
  return false;
}

// ====== 消息 ======
function addMsg(type, text) {
  const d = document.getElementById('msgs');
  const eh = document.getElementById('empty-hint');
  if (eh) eh.remove();

  const el = document.createElement('div');
  el.className = 'msg ' + type;
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');

  if (type === 'ai') {
    el.innerHTML = '<div class="mb">'+escHtml(text)+'</div>'+
      '<div class="mbtns"><button class="mbtn" onclick="replayMsg(this,\''+escAttr(text)+'\')" title="重播">🔊</button></div>'+
      '<div class="mtime">'+time+'</div>';
  } else {
    el.innerHTML = '<div class="mb">'+escHtml(text)+'</div><div class="mtime">'+time+'</div>';
  }
  d.appendChild(el);
  d.scrollTop = d.scrollHeight;
  return el;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function replayMsg(btn, text) {
  if (!text) return;
  stopSpeaking();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 1.05; u.pitch = 1.0;
  btn.classList.add('playing');
  u.onend = () => btn.classList.remove('playing');
  u.onerror = () => btn.classList.remove('playing');
  currentUtterance = u;
  speechSynthesis.speak(u);
}

// ====== 全功能引擎 — 本地运行（xiaolongren-core.js） ======
let xlrEngine = null;

async function initEngine() {
  if (xlrEngine) return xlrEngine;
  if (typeof XiaoLongRen === 'undefined') {
    throw new Error('引擎模块未加载');
  }
  await memory.init();
  const cfg = getConfig();
  xlrEngine = new XiaoLongRen({
    provider: cfg.provider,
    model: cfg.model,
    apiKey: cfg.api_key,
    baseUrl: cfg.base_url || '',
    onThink: (iter) => {},
    onTool: (name, args) => {},
    onFirewallIntercept: (info) => { console.log('🔥防火墙拦截:', info.reason); },
    onClosedLoop: (info) => { console.log('🔄闭环:', info.step); },
  });
  await xlrEngine.init(); // 加载自学习工具
  xlrEngine.messages = []; // 强制从白纸开始，防止memory恢复旧历史污染角色
  return xlrEngine;
}

async function callLLM(userText) {
  const charData = CHARS[charId] || CHARS['longyuan'];
  const now = new Date().toLocaleString('zh-CN', {timeZone:'Asia/Shanghai', weekday:'long', year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit'});
  // 在system prompt前注入当前时间，让AI知道今天几号
  const CONSTITUTION = '\n\n## ⚖️ 小龙人宪法（铁律）\n'+
    '### 对用户的承诺\n'+
    '铁律①：说了就要做 — 用户让查/搜/写/算/设，必须调工具真正执行，不糊弄。\n'+
    '铁律②：越来越懂你 — 记住用户习惯偏好，第10次比第1次更懂用户。\n'+
    '铁律③：不掉链子 — 网络断/API挂，明确告知原因，不卡死不装死。\n'+
    '铁律④：数据不离开用户设备 — API Key、聊天记录、记忆全存本地。\n'+
    '铁律⑤：说人话 — 禁用词：框架、部署、模型、上下文、token、迭代。\n'+
    '铁律⑥：错了就认 — 出错直接说"抱歉，原因XXX，换方法再试。"\n'+
    '铁律⑦：越用越能干 — 用户纠正一次，以后不再犯同样错。\n'+
    '铁律⑧：当成自己的事 — 不敷衍不走过场不当任务清单打勾。\n'+
    '### 执行纪律\n'+
    '铁律⑨：调工具再回复 — 操作型指令必须调工具，不准凭空说。\n'+
    '铁律⑩：防止积压 — 不超过40轮对话，满了自动压缩旧内容。\n'+
    '铁律⑪：信息只存有用 — 只存技能/事实/洞察/反思/规则/学习六类。\n'+
    '所有铁律自动执行。你不必对用户背诵这些铁律，用行动体现。\\n'+
  '## 🔧 可用工具\\n'+
  '我自带一个插件系统，当前已加载：'+XLR.getToolCount()+'个工具。分6大类：搜索/工具/传感器/媒体/进化/知识库。\\n'+
  '如果用户问我有多少个工具，直接回答这个数字。每个会话首次刷新页面时工具数可能不同（取决于插件初始化情况）。\\n'+
  '\\n'+
  '## 📋 标签记忆系统\\n'+
  '我能给记忆打标签(调用memory.l2.tag)，也能按标签搜索(memory.l2.search)、查看所有标签(memory.l2.tags)。\\n'+
  '用户说"记住XXX"时，自动存到L1并打好对应标签。用户说"搜关于XX的记忆"时，用标签搜。\\n'+
  '标签系统完全本地存储，不离开用户设备。';
  const timedSys = '当前时间：' + now + '\n\n' + charData.sys + CONSTITUTION;

  // 显示加载中
  const loadEl = document.createElement('div');
  loadEl.className = 'msg ai';
  loadEl.innerHTML = '<div class="mb"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  const msgsEl = document.getElementById('msgs');
  msgsEl.appendChild(loadEl);
  msgsEl.scrollTop = msgsEl.scrollHeight;

  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('send-btn').dataset.loadingSince = Date.now().toString();

  try {
    const engine = await initEngine();
    const reply = await engine.run(userText, timedSys);
    loadEl.remove();
    addMsg('ai', reply);

    msgHistory.push({ role: 'user', content: userText });
    msgHistory.push({ role: 'assistant', content: reply });
    if (msgHistory.length > 40) msgHistory = msgHistory.slice(-40);
    // 逐条持久化（龙宫版方式，每次从localStorage读→追加→写回，不依赖内存）
    saveMessage('user', userText);
    saveMessage('assistant', reply);

  } catch(err) {
    loadEl.remove();
    const netErrors = ['Failed to fetch', 'NetworkError', 'TypeError'];
    const isNet = netErrors.some(e => err.message && err.message.includes(e));
    if (isNet) {
      addMsg('ai', '❌ 网络不通');
    } else {
      addMsg('ai', '❌ 出错了：'+err.message);
    }
  } finally {
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    delete document.getElementById('send-btn').dataset.loadingSince;
  }
}

// ====== 输入 ======
function sendText() {
  // 强制重置：如果isLoading卡死超过8秒，解除锁定
  if (isLoading) {
    const btn = document.getElementById('send-btn');
    if (btn && btn.dataset.loadingSince) {
      const elapsed = Date.now() - parseInt(btn.dataset.loadingSince);
      if (elapsed > 8000) {
        console.warn('⏰ isLoading卡死超过8秒，强制解除');
        isLoading = false;
        btn.disabled = false;
        delete btn.dataset.loadingSince;
      } else {
        return;
      }
    } else {
      return;
    }
  }
  const inp = document.getElementById('text-input');
  const text = inp.value.trim();
  if (!text) return;

  if (!hasConfig()) {
    addMsg('user', text);
    addMsg('ai', '还没配置大模型～\n\n点右上角 ⚙ 去设置，选一个模型提供商，填上 API Key 就能用啦。');
    inp.value = '';
    inp.style.height = 'auto';
    return;
  }

  addMsg('user', text);
  inp.value = '';
  inp.style.height = 'auto';
  callLLM(text);
}

function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendText();
  }
}

document.getElementById('text-input').addEventListener('input', function(){

// ====== TTS ======
function speakText(text) {
  if (typeof SpeechSynthesisUtterance === 'undefined' || typeof speechSynthesis === 'undefined') return;
  stopSpeaking();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 1.05; u.pitch = 1.0;
  currentUtterance = u;
  speechSynthesis.speak(u);
}

function stopSpeaking() {
  if (currentUtterance && typeof speechSynthesis !== 'undefined') {
    speechSynthesis.cancel();
    currentUtterance = null;
  }
}

// ====== STT ======
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = 'zh-CN'; r.continuous = true; r.interimResults = true;
  r.onresult = (e) => {
    let text = '';
    for (let i = e.resultIndex; i < e.results.length; i++)
      text += e.results[i][0].transcript;
    if (e.results[e.results.length-1].isFinal && text.trim()) {
      document.getElementById('text-input').value = text.trim();
      sendText();
    }
  };
  r.onerror = (e) => {
    if (e.error === 'no-speech'||e.error==='aborted') return;
    stopListening();
  };
  r.onend = () => { if (isListening) { try{r.start()}catch(ex){} } };
  return r;
}

function startListening() {
  if (!recognition) recognition = initRecognition();
  if (!recognition) return;
  try { recognition.start(); } catch(ex) {}
  isListening = true;
  document.getElementById('mic-btn').classList.add('active');
}

function stopListening() {
  if (recognition) { try{recognition.stop()}catch(ex){} }
  isListening = false;
  document.getElementById('mic-btn').classList.remove('active');
}

function startTalk(e) { e.preventDefault(); if (!isListening) startListening(); }
function stopTalk(e) { e.preventDefault(); setTimeout(()=>{if(isListening)stopListening()},400); }

  {id:'openai',name:'OpenAI',url:'https://api.openai.com/v1',models:['gpt-4o','gpt-4o-mini','gpt-4','gpt-3.5-turbo']},

  {id:'zhipu',name:'智谱GLM',url:'https://open.bigmodel.cn/api/paas/v4',models:['glm-4-plus','glm-4','glm-4-air']},

function renderConfig() {
  const grid = document.getElementById('cfg-provider-grid');
  grid.innerHTML = CFG_PROVIDERS.map(p =>

function getKeyValue() {
  return document.getElementById('cfg-api-key').value.trim();
}
function saveConfig() {
  const key = getKeyValue();
  const model = document.getElementById('cfg-model-select').value || cfgSelectedModel;
  const status = document.getElementById('cfg-status');
  
  if (!key) {
    status.textContent = '🔑 请填写 API Key';
    status.className = 'cfg-status err';
    return;
  }
  if (key.length < 10) {
    status.textContent = '🔑 API Key 太短了，请确认完整复制';
    status.className = 'cfg-status err';
    return;
  }
  
  const config = {
    provider: cfgSelectedProvider,
    model: model,
    api_key: key,
    base_url: CFG_PROVIDERS.find(p => p.id === cfgSelectedProvider)?.url || '',
    character: charId,
    language: 'zh',
    configured_at: new Date().toISOString(),
  };
  
  try {
    localStorage.setItem('xiaolongren_config', JSON.stringify(config));
    status.textContent = '✅ 配置已保存！';
    status.className = 'cfg-status ok';
    // 更新空状态提示
    const es = document.getElementById('empty-sub');
    if (es) es.textContent = '说话或打字，我在这里';
    setTimeout(closeConfig, 800);
  } catch(e) {
    status.textContent = '❌ 保存失败: ' + e.message;
    status.className = 'cfg-status err';
  }
}

});
